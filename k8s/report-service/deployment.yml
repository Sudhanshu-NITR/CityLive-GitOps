apiVersion: apps/v1
kind: Deployment
metadata: 
  name: report-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: report-service
  templates:
    metadata:
      labels:
        app: report-service
    spec:
      containers:
        - name: report-service
          image: sudh1804/citylive-report-service:latest
          ports:
            - containerPort: 5000