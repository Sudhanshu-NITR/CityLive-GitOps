apiVersion: apps/v1
kind: Deployment
metadata:
  name: event-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: event-service
  template:
    metadata:
      labels:
        app: event-service
    spec:
      containers:
        - name: event-service
          image: sudh1804/citylive-event-service:4
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef: 
                name: citylive-config
          env:
            - name: PORT
              value: "8081"