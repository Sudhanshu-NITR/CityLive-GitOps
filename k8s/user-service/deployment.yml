apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
        - name: user-service
          image: sudh1804/citylive-user-service:4
          ports:
            - containerPort: 8082
          envFrom:
            - configMapRef: 
                name: citylive-config
          env:
            - name: PORT
              value: "8082"